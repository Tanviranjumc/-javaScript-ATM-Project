<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Dutch Bank ATM</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
                              <div class="alert alert-success text-center" role="alert">
                                    <h4 class="alert-heading">Welcome to Dutch Bank ATM!</h4>                 
                              </div>
      <div class="container mt-5 p-5 rounded-4  container-lg border  border-dark border-outline-3 bg-success"> 
            <h1 class="text-center mb-4">Welcome to Dutch Bank ATM</h1>
            <div class="d-flex justify-content-center">
                  <a href="login.html" class="btn btn-primary btn-lg">Start ATM Machine</a>
            </div>
            <div class="card mt-3  border rounded border-dark rounded-4  ">
                        <div class="card-body p-5 card-outline-3 bg-dark border rounded-2xl text-color-success">
                              <h5 class="card-title text-center text-white-50 bg-dark">ATM Services</h5>
                              <p class="card-text fw-bold text-center text-white-50 bg-dark">Access your account and perform transactions.</p>

                              <div class="cotainer p-5 border rounded-2 border-outline-3 mb-2"  >
                                    <p id="output" class="text text-center fw-bold text-success"></p>
                                    <h id="optionDisplay" class="text text-center fw-bold text-success"></h1>
                                    <h1 id="balanceDisplay" class="text text-center fw-bold text-success"></h1>
                                    <h2 id="transactionDisplay" class="text text-center fw-bold text-success"></h2>
                                    
                              </div>

                         


                              
                        </div>
            </div>
            
      <script>



            
            let x = prompt("Pls Enter your name");
            document.getElementById("transactionDisplay").innerHTML=(x);
            
            let pin = 60600;
            let balance = 10000000;
            let input = prompt("Please enter your PIN:");
            if (pin == input) {
                  document.getElementById("output").innerHTML = "Welcome to Dutch Bank ATM! Your balance is: " + balance;
            } else {
                  document.getElementById("output").innerHTML = "Invalid PIN. Please try again.";
            }
            //Choose Your Option Number
            //  # 1. Cash Withdraw 
            //  # 2. Check balance 
            //  # 3. Change pin
            //  # 4. First Cash Withdraw
            //  # 5. Statement 
        
            let option = prompt("Choose an option: \n1. Check Balance \n2. Withdraw Cash \n3. Deposit Cash \n4.First Cash Withdraw \n5. Statement \n6. Exit");
            if (option == 1) {
                  document.getElementById("output").innerHTML = "Your balance is: " + balance;
            } else if (option == 2) {
                  let withdrawAmount = prompt("Enter the amount to withdraw:");
                  if (withdrawAmount > balance) {
                        document.getElementById("output").innerHTML = "Insufficient funds.";
                  } else if (withdrawAmount <= 0) {
                        document.getElementById("output").innerHTML = "Invalid amount. Please enter a positive number.";
                  } else {
                        balance -= withdrawAmount;
                        document.getElementById("output").innerHTML = "You have withdrawn: " + withdrawAmount + ". Your new balance is: " + balance;
                  }
            } else if (option == 3) {
                  let depositAmount = prompt("Enter the amount to deposit:");
                  balance += parseInt(depositAmount);
                  document.getElementById("output").innerHTML = "You have deposited: " + depositAmount + ". Your new balance is: " + balance;
            }
             else if (option == 4) {
                  let firstWithdrawAmount = prompt("Enter the amount for first cash withdraw:");
                  if (firstWithdrawAmount > balance) {
                        document.getElementById("optionDisplay").innerHTML = "Insufficient funds.";
                  } else if (firstWithdrawAmount <= 0) {
                        document.getElementById("output").innerHTML = "Invalid amount. Please enter a positive number.";
                  } else {
                        balance -= firstWithdrawAmount;
                        document.getElementById("output").innerHTML = "You have withdrawn: " + firstWithdrawAmount + ". Your new balance is: " + balance;
                  }
             }
             else if (option == 5) {
                  document.getElementById("output").innerHTML = "Your transaction statement is:" + balance;
             }
             else if (option == 6) {
                  document.getElementById("output").innerHTML = "Thank you for using Dutch Bank ATM. Goodbye!";
             }
            
            // Invalid pin & option number
            else {
                  document.getElementById("output").innerHTML = "Invalid option. Please try again.";
            }
            
       

       

</script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="script.js"></script>
</body>
</html>
